<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="compileGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="runtimeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="ideGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="s3">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b949e"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="900" height="480" fill="url(#bg3)" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" fill="#e6edf3" font-size="16" font-weight="700" text-anchor="middle">How Rebound Works</text>

  <!-- Phase labels -->
  <text x="185" y="68" fill="#a5b4fc" font-size="12" font-weight="600" text-anchor="middle">COMPILE TIME</text>
  <line x1="60" y1="76" x2="310" y2="76" stroke="#6366f1" stroke-width="1" opacity="0.4"/>

  <text x="500" y="68" fill="#fdba74" font-size="12" font-weight="600" text-anchor="middle">RUNTIME</text>
  <line x1="370" y1="76" x2="630" y2="76" stroke="#f97316" stroke-width="1" opacity="0.4"/>

  <text x="780" y="68" fill="#86efac" font-size="12" font-weight="600" text-anchor="middle">IDE</text>
  <line x1="690" y1="76" x2="870" y2="76" stroke="#22c55e" stroke-width="1" opacity="0.4"/>

  <!-- Compile time boxes -->
  <!-- Compose Compiler -->
  <rect x="40" y="95" width="140" height="55" rx="8" fill="#1a1e2e" stroke="#4f46e5" stroke-width="1.5" filter="url(#s3)"/>
  <text x="110" y="118" fill="#a5b4fc" font-size="11" font-weight="600" text-anchor="middle">Compose Compiler</text>
  <text x="110" y="135" fill="#6b7280" font-size="9" text-anchor="middle">$changed masks, stability</text>

  <!-- Rebound IR Transformer -->
  <rect x="40" y="170" width="290" height="110" rx="8" fill="#1a1e2e" stroke="#6366f1" stroke-width="2" filter="url(#s3)"/>
  <text x="185" y="195" fill="#a5b4fc" font-size="13" font-weight="700" text-anchor="middle">Rebound IR Transformer</text>

  <!-- Sub-steps inside IR transformer -->
  <rect x="55" y="207" width="120" height="30" rx="5" fill="#312e81" opacity="0.5"/>
  <text x="115" y="226" fill="#c7d2fe" font-size="9.5" text-anchor="middle">Classify budget role</text>

  <rect x="55" y="243" width="120" height="30" rx="5" fill="#312e81" opacity="0.5"/>
  <text x="115" y="262" fill="#c7d2fe" font-size="9.5" text-anchor="middle">Resolve lambda names</text>

  <rect x="195" y="207" width="120" height="30" rx="5" fill="#312e81" opacity="0.5"/>
  <text x="255" y="226" fill="#c7d2fe" font-size="9.5" text-anchor="middle">Collect $changed bits</text>

  <rect x="195" y="243" width="120" height="30" rx="5" fill="#312e81" opacity="0.5"/>
  <text x="255" y="262" fill="#c7d2fe" font-size="9.5" text-anchor="middle">Inject tracking calls</text>

  <!-- Arrow from Compose Compiler to IR Transformer -->
  <line x1="110" y1="150" x2="110" y2="170" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Arrow from IR Transformer to Runtime -->
  <line x1="330" y1="225" x2="370" y2="225" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Runtime boxes -->
  <rect x="380" y="95" width="250" height="200" rx="8" fill="#1a1e2e" stroke="#f97316" stroke-width="2" filter="url(#s3)"/>
  <text x="505" y="120" fill="#fdba74" font-size="13" font-weight="700" text-anchor="middle">Rebound Runtime</text>

  <rect x="395" y="135" width="220" height="32" rx="5" fill="#431407" opacity="0.5"/>
  <text x="505" y="156" fill="#fed7aa" font-size="10" text-anchor="middle">Rate monitor (sliding window)</text>

  <rect x="395" y="175" width="220" height="32" rx="5" fill="#431407" opacity="0.5"/>
  <text x="505" y="196" fill="#fed7aa" font-size="10" text-anchor="middle">Budget comparison engine</text>

  <rect x="395" y="215" width="105" height="32" rx="5" fill="#431407" opacity="0.5"/>
  <text x="447" y="236" fill="#fed7aa" font-size="10" text-anchor="middle">Interaction</text>
  <text x="447" y="247" fill="#fed7aa" font-size="9" text-anchor="middle">detector</text>

  <rect x="510" y="215" width="105" height="32" rx="5" fill="#431407" opacity="0.5"/>
  <text x="562" y="236" fill="#fed7aa" font-size="10" text-anchor="middle">$changed</text>
  <text x="562" y="247" fill="#fed7aa" font-size="9" text-anchor="middle">decoder</text>

  <rect x="395" y="255" width="220" height="32" rx="5" fill="#431407" opacity="0.5"/>
  <text x="505" y="276" fill="#fed7aa" font-size="10" text-anchor="middle">60s ring buffer + sparkline data</text>

  <!-- Socket arrow -->
  <line x1="630" y1="200" x2="690" y2="200" stroke="#f97316" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="660" y="190" fill="#f97316" font-size="9" font-weight="600" text-anchor="middle">Socket</text>

  <!-- IDE boxes -->
  <rect x="700" y="95" width="170" height="200" rx="8" fill="#1a1e2e" stroke="#22c55e" stroke-width="2" filter="url(#s3)"/>
  <text x="785" y="120" fill="#86efac" font-size="13" font-weight="700" text-anchor="middle">IDE Plugin</text>

  <rect x="715" y="135" width="140" height="28" rx="5" fill="#052e16" opacity="0.5"/>
  <text x="785" y="154" fill="#bbf7d0" font-size="10" text-anchor="middle">Live composable tree</text>

  <rect x="715" y="170" width="140" height="28" rx="5" fill="#052e16" opacity="0.5"/>
  <text x="785" y="189" fill="#bbf7d0" font-size="10" text-anchor="middle">Rate sparklines (60s)</text>

  <rect x="715" y="205" width="140" height="28" rx="5" fill="#052e16" opacity="0.5"/>
  <text x="785" y="224" fill="#bbf7d0" font-size="10" text-anchor="middle">Budget violations</text>

  <rect x="715" y="240" width="140" height="28" rx="5" fill="#052e16" opacity="0.5"/>
  <text x="785" y="259" fill="#bbf7d0" font-size="10" text-anchor="middle">Param change detail</text>

  <!-- Output section -->
  <rect x="120" y="340" width="660" height="110" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1.5" filter="url(#s3)"/>
  <text x="140" y="365" fill="#f97316" font-size="11" font-weight="600" font-family="'JetBrains Mono', 'Fira Code', monospace">BUDGET VIOLATION</text>
  <text x="140" y="385" fill="#e6edf3" font-size="11" font-family="'JetBrains Mono', 'Fira Code', monospace">ProfileHeader  rate=11/s  exceeds LEAF budget=5/s</text>
  <text x="140" y="405" fill="#8b949e" font-size="11" font-family="'JetBrains Mono', 'Fira Code', monospace">  → params: avatarUrl=<tspan fill="#ef4444">CHANGED</tspan>  displayName=<tspan fill="#ef4444">CHANGED</tspan></text>
  <text x="140" y="425" fill="#8b949e" font-size="11" font-family="'JetBrains Mono', 'Fira Code', monospace">  → forced: 0 | param-driven: 11 | interaction: <tspan fill="#22c55e">IDLE</tspan></text>

  <!-- Arrow from runtime to output -->
  <line x1="505" y1="295" x2="505" y2="340" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowhead)"/>
</svg>