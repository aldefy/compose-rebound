<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="s5">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="900" height="340" fill="url(#bg5)" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" fill="#e6edf3" font-size="16" font-weight="700" text-anchor="middle">Decoding the $changed Bitmask</text>
  <text x="450" y="53" fill="#8b949e" font-size="11" text-anchor="middle">2 bits per parameter — the Compose compiler's stability verdict at recomposition time</text>

  <!-- Function signature -->
  <rect x="60" y="72" width="780" height="38" rx="6" fill="#1a1e2e" stroke="#30363d" stroke-width="1" filter="url(#s5)"/>
  <text x="80" y="96" fill="#c9d1d9" font-size="12" font-family="'JetBrains Mono', 'Fira Code', monospace">
    <tspan fill="#ff7b72">fun</tspan> <tspan fill="#d2a8ff">ProfileHeader</tspan>(<tspan fill="#79c0ff">avatarUrl</tspan>: String, <tspan fill="#79c0ff">displayName</tspan>: String, <tspan fill="#79c0ff">isOnline</tspan>: Boolean, <tspan fill="#79c0ff">$changed</tspan>: Int)
  </text>

  <!-- Bitmask visualization -->
  <text x="450" y="142" fill="#8b949e" font-size="11" text-anchor="middle">$changed = 0b_00_10_10_11</text>

  <!-- Bit boxes -->
  <!-- Padding bits -->
  <g transform="translate(195, 158)">
    <rect width="48" height="48" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="24" y="22" fill="#484f58" font-size="16" font-weight="700" text-anchor="middle" font-family="'JetBrains Mono', monospace">0</text>
    <text x="24" y="37" fill="#484f58" font-size="16" font-weight="700" text-anchor="middle" font-family="'JetBrains Mono', monospace">0</text>
  </g>

  <!-- isOnline: DIFFERENT (10) -->
  <g transform="translate(260, 158)">
    <rect width="110" height="48" rx="4" fill="#3b0712" stroke="#ef4444" stroke-width="1.5"/>
    <text x="55" y="22" fill="#f87171" font-size="16" font-weight="700" text-anchor="middle" font-family="'JetBrains Mono', monospace">1  0</text>
    <text x="55" y="37" fill="#fca5a5" font-size="9" text-anchor="middle">DIFFERENT</text>
  </g>

  <!-- displayName: DIFFERENT (10) -->
  <g transform="translate(387, 158)">
    <rect width="110" height="48" rx="4" fill="#3b0712" stroke="#ef4444" stroke-width="1.5"/>
    <text x="55" y="22" fill="#f87171" font-size="16" font-weight="700" text-anchor="middle" font-family="'JetBrains Mono', monospace">1  0</text>
    <text x="55" y="37" fill="#fca5a5" font-size="9" text-anchor="middle">DIFFERENT</text>
  </g>

  <!-- avatarUrl: STATIC (11) -->
  <g transform="translate(514, 158)">
    <rect width="110" height="48" rx="4" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <text x="55" y="22" fill="#4ade80" font-size="16" font-weight="700" text-anchor="middle" font-family="'JetBrains Mono', monospace">1  1</text>
    <text x="55" y="37" fill="#86efac" font-size="9" text-anchor="middle">STATIC</text>
  </g>

  <!-- Parameter labels above -->
  <text x="219" y="153" fill="#484f58" font-size="9" text-anchor="middle">pad</text>
  <text x="315" y="153" fill="#fca5a5" font-size="9" text-anchor="middle">isOnline</text>
  <text x="442" y="153" fill="#fca5a5" font-size="9" text-anchor="middle">displayName</text>
  <text x="569" y="153" fill="#86efac" font-size="9" text-anchor="middle">avatarUrl</text>

  <!-- Legend -->
  <g transform="translate(60, 235)">
    <rect width="180" height="90" rx="6" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
    <text x="15" y="22" fill="#8b949e" font-size="10" font-weight="600">BIT ENCODING</text>

    <rect x="15" y="32" width="24" height="14" rx="3" fill="#21262d" stroke="#484f58" stroke-width="1"/>
    <text x="27" y="43" fill="#484f58" font-size="9" font-weight="700" text-anchor="middle">00</text>
    <text x="48" y="43" fill="#8b949e" font-size="10">UNCERTAIN</text>

    <rect x="15" y="50" width="24" height="14" rx="3" fill="#0c2d48" stroke="#3b82f6" stroke-width="1"/>
    <text x="27" y="61" fill="#60a5fa" font-size="9" font-weight="700" text-anchor="middle">01</text>
    <text x="48" y="61" fill="#8b949e" font-size="10">SAME</text>

    <rect x="15" y="68" width="24" height="14" rx="3" fill="#3b0712" stroke="#ef4444" stroke-width="1"/>
    <text x="27" y="79" fill="#f87171" font-size="9" font-weight="700" text-anchor="middle">10</text>
    <text x="48" y="79" fill="#8b949e" font-size="10">DIFFERENT</text>
  </g>

  <g transform="translate(255, 235)">
    <rect width="130" height="90" rx="6" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
    <rect x="15" y="6" width="24" height="14" rx="3" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
    <text x="27" y="17" fill="#4ade80" font-size="9" font-weight="700" text-anchor="middle">11</text>
    <text x="48" y="17" fill="#8b949e" font-size="10">STATIC</text>
    <text x="15" y="42" fill="#6b7280" font-size="9">2 bits per param</text>
    <text x="15" y="56" fill="#6b7280" font-size="9">10+ params →</text>
    <text x="15" y="70" fill="#6b7280" font-size="9">$changed1, $changed2</text>
  </g>

  <!-- What Rebound does with this -->
  <rect x="420" y="235" width="440" height="90" rx="6" fill="#1a1e2e" stroke="#f97316" stroke-width="1.5" filter="url(#s5)"/>
  <text x="440" y="257" fill="#fdba74" font-size="11" font-weight="600">What Rebound reports:</text>
  <text x="440" y="278" fill="#c9d1d9" font-size="11" font-family="'JetBrains Mono', monospace">avatarUrl = <tspan fill="#4ade80">STATIC</tspan> (never changes)</text>
  <text x="440" y="296" fill="#c9d1d9" font-size="11" font-family="'JetBrains Mono', monospace">displayName = <tspan fill="#f87171">DIFFERENT</tspan> ← investigate</text>
  <text x="440" y="314" fill="#c9d1d9" font-size="11" font-family="'JetBrains Mono', monospace">isOnline = <tspan fill="#f87171">DIFFERENT</tspan> ← investigate</text>
</svg>