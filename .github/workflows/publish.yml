name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"   # e.g. 0.1.0, 0.2.0-beta01

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dkotlin.incremental=false

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches gradle.properties version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          GRADLE_VERSION=$(grep '^rebound_version=' gradle.properties | cut -d'=' -f2)
          if [ "$TAG" != "$GRADLE_VERSION" ]; then
            echo "::error::Tag '$TAG' does not match gradle.properties version '$GRADLE_VERSION'"
            exit 1
          fi
          echo "Version check passed: $TAG"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      # Main modules: runtime, compiler, gradle plugin
      - name: Publish main modules to local staging
        run: |
          ./gradlew publishAllPublicationsToLocalStagingRepository \
            -Psigning.gnupg.keyName=${{ secrets.GPG_KEY_ID }} \
            -Psigning.gnupg.passphrase=${{ secrets.GPG_PASSPHRASE }}

      # Gradle plugin (separate composite build — includeBuild is excluded from root publishAll)
      - name: Publish gradle plugin to local staging
        working-directory: rebound-gradle
        run: |
          ./gradlew publishAllPublicationsToLocalStagingRepository \
            -Psigning.gnupg.keyName=${{ secrets.GPG_KEY_ID }} \
            -Psigning.gnupg.passphrase=${{ secrets.GPG_PASSPHRASE }}

      # Compiler plugin for Kotlin 2.2.x (separate composite build)
      - name: Publish compiler-k2 to local staging
        working-directory: rebound-compiler-k2
        run: |
          ./gradlew publishAllPublicationsToLocalStagingRepository \
            -Psigning.gnupg.keyName=${{ secrets.GPG_KEY_ID }} \
            -Psigning.gnupg.passphrase=${{ secrets.GPG_PASSPHRASE }}

      # Compiler plugin for Kotlin 2.3.x (separate composite build)
      - name: Publish compiler-k2-3 to local staging
        working-directory: rebound-compiler-k2-3
        run: |
          ./gradlew publishAllPublicationsToLocalStagingRepository \
            -Psigning.gnupg.keyName=${{ secrets.GPG_KEY_ID }} \
            -Psigning.gnupg.passphrase=${{ secrets.GPG_PASSPHRASE }}

      - name: Verify publications
        run: |
          echo "=== Main modules ==="
          find rebound-compiler/build/staging-deploy rebound-runtime/build/staging-deploy -mindepth 4 -maxdepth 4 -type d 2>/dev/null | sort
          echo "=== Gradle plugin ==="
          find rebound-gradle/build/staging-deploy -mindepth 4 -maxdepth 4 -type d 2>/dev/null | sort
          echo "=== Compiler K2 ==="
          find rebound-compiler-k2/build/staging-deploy -mindepth 4 -maxdepth 4 -type d 2>/dev/null | sort
          echo "=== Compiler K2-3 ==="
          find rebound-compiler-k2-3/build/staging-deploy -mindepth 4 -maxdepth 4 -type d 2>/dev/null | sort

      - name: Create bundle zip
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          mkdir -p bundle

          # Merge all staging-deploy directories
          for dir in rebound-compiler rebound-runtime rebound-gradle; do
            if [ -d "$dir/build/staging-deploy/io" ]; then
              rsync -a "$dir/build/staging-deploy/io/" bundle/io/
            fi
          done
          rsync -a rebound-compiler-k2/build/staging-deploy/io/ bundle/io/
          rsync -a rebound-compiler-k2-3/build/staging-deploy/io/ bundle/io/

          cd bundle
          zip -r "$GITHUB_WORKSPACE/rebound-${TAG}-bundle.zip" io/

      - name: Build IDE plugin
        run: ./gradlew :rebound-ide:buildPlugin

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          IDE_ZIP=$(find rebound-ide/build/distributions -name "*.zip" | head -1)

          gh release create "$TAG" \
            "rebound-${TAG}-bundle.zip" \
            "$IDE_ZIP" \
            --title "Rebound $TAG" \
            --generate-notes \
            --latest
